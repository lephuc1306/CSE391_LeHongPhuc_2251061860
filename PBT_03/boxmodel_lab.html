<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B2 - Box Model Lab</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <h1>Phần 1: Chứng minh content-box vs border-box</h1>
    <div class="box-wrapper">
        <div class="box box-content">
            Hộp 1: content-box
        </div>
        <div class="box box-border">
            Hộp 2: border-box
        </div>
    </div>
    <p>Hãy mở DevTools (F12) -> tab Elements -> tab Computed để chụp screenshot Box Model của 2 hộp trên nhé.</p>

    <hr>

    <h1>Phần 2: Layout 3 cột</h1>
    <div class="layout-container">
        <div class="column sidebar">
            Cột trái (Sidebar)
        </div>
        <div class="column content">
            Cột giữa (Content)
        </div>
        <div class="column ads">
            Cột phải (Ads)
        </div>
    </div>

</body>
</html>
