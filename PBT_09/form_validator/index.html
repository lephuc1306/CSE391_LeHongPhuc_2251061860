<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator Real-time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label>Họ và tên</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Nhập họ tên (2-50 ký tự)">
                    <span class="icon" id="nameIcon"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <small class="error-text" id="emailError"></small>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <small class="status-text" id="passwordStatus"></small>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <small class="error-text" id="confirmError"></small>
            </div>

            <div class="form-group">
                <label>Số điện thoại (10 số)</label>
                <div class="input-wrapper">
                    <input type="text" id="phone" placeholder="0901-234-567" maxlength="12">
                    <span class="icon" id="phoneIcon"></span>
                </div>
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng Ký</button>
        </form>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3 style="color: #2ecc71;">🎉 Đăng ký thành công!</h3>
            <div id="modalData"></div>
            <button id="closeModalBtn">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
