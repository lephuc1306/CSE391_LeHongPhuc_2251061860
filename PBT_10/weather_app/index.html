<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Async/Await</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🌤️ Dự Báo Thời Tiết</h1>
            <form id="searchForm">
                <input type="text" id="cityInput" placeholder="Nhập tên thành phố (vd: Hanoi, Tokyo)..." autocomplete="off">
                <button type="submit">Tìm</button>
            </form>
        </header>

        <div class="history-container">
            <p>Lịch sử tìm kiếm:</p>
            <div id="historyList" class="history-list">
                </div>
        </div>

        <main id="weatherContainer">
            <div class="empty-state">
                Hãy nhập tên thành phố để xem thời tiết!
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
