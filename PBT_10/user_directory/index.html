<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory - CRUD API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>👥 Quản Lý Người Dùng</h1>
            <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm theo tên hoặc email...">
        </header>

        <div class="layout">
            <aside class="sidebar">
                <h3 id="formTitle">Thêm User Mới</h3>
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" id="nameInput" placeholder="VD: Nguyễn Văn A" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="emailInput" placeholder="VD: email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Điện thoại</label>
                        <input type="text" id="phoneInput" placeholder="VD: 0901234567" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="btn-primary">Thêm mới</button>
                        <button type="button" id="cancelBtn" class="btn-secondary" hidden>Hủy</button>
                    </div>
                </form>
            </aside>

            <main class="content">
                <div id="userGrid" class="user-grid">
                    </div>
            </main>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
