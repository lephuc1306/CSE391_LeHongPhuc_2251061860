<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B3 - E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="grid-container">
        <header class="header">
            HEADER (full width)
        </header>

        <section class="hero">
            <div class="hero-text">
                <h2>HERO BANNER</h2>
                <p>Khuyến mãi mùa hè!</p>
            </div>
            
            <div class="hero-card-featured">
                <h3>Sản phẩm Nổi Bật (Span 2)</h3>
                <p>Giảm giá 50% chỉ hôm nay</p>
            </div>
        </section>

        <aside class="sidebar">
            <h3>Bộ lọc (Filter)</h3>
            <div class="filters">
                <label><input type="checkbox"> Điện thoại</label>
                <label><input type="checkbox"> Laptop</label>
                <label><input type="checkbox"> Phụ kiện</label>
                <hr style="margin: 10px 0; border: 0.5px solid #eee;">
                <label><input type="checkbox"> Apple</label>
                <label><input type="checkbox"> Samsung</label>
                <label><input type="checkbox"> Xiaomi</label>
            </div>
        </aside>

        <main class="main-content">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>
            <div class="card">Card 6</div>
        </main>

        <aside class="ads">
            <h3>Quảng Cáo</h3>
            <img src="https://via.placeholder.com/200x400?text=ADS+BANNER" alt="Ads Banner">
        </aside>

        <footer class="footer">
            FOOTER (full width)
        </footer>
    </div>

</body>
</html>
