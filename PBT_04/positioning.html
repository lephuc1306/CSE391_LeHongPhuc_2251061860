<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

    <header class="header">
        <div class="logo">🚀 MyLogo</div>
        <nav class="nav">Trang chủ | Sản phẩm | Liên hệ</nav>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <h3>Danh mục</h3>
            <ul style="list-style-type: none; padding-top: 16px; line-height: 2;">
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Phụ kiện</li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="card">
                <div class="badge">HOT</div>
                <h3>Laptop Gaming Pro Max</h3>
                <p>Mô tả: Cấu hình siêu khủng, tản nhiệt cực mát...</p>
            </div>

            <div class="scroll-space">
                <p>👇 Cuộn trang xuống để kiểm tra:</p>
                <ul>
                    <li>hehehe</li>
                    <li>hihihi</li>
                    <li>kakaka</li>
                </ul>
            </div>
        </main>
    </div>

    <button class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

</body>
</html>
