<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Công Việc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 Quản Lý Công Việc Cá Nhân</h1>
        </header>

        <div id="notification" class="notification hidden"></div>

        <div class="stats-panel">
            <div class="stat-box">
                <span class="stat-label">Tổng cộng:</span>
                <strong id="total-count" class="text-primary">0</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Đã xong:</span>
                <strong id="completed-count" class="text-success">0</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Chưa xong:</span>
                <strong id="pending-count" class="text-warning">0</strong>
            </div>
            <button id="btn-open-modal" class="btn btn-primary">+ Thêm công việc</button>
        </div>

        <div id="task-list" class="task-grid">
            </div>
    </div>

    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Thêm công việc mới</h2>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label>Tiêu đề công việc *</label>
                    <input type="text" id="title" placeholder="VD: Học JavaScript DOM">
                    <small class="error-msg" id="err-title"></small>
                </div>

                <div class="form-group">
                    <label>Mô tả ngắn</label>
                    <textarea id="description" rows="3" placeholder="Chi tiết công việc..."></textarea>
                    <small class="error-msg" id="err-desc"></small>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label>Hạn hoàn thành *</label>
                        <input type="date" id="dueDate">
                        <small class="error-msg" id="err-dueDate"></small>
                    </div>
                    <div class="form-group half-width">
                        <label>Mức ưu tiên</label>
                        <select id="priority">
                            <option value="Thấp">Thấp</option>
                            <option value="Trung bình" selected>Trung bình</option>
                            <option value="Cao">Cao</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu công việc</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
